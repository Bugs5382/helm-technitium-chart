title: "[Idea] "
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: The problem or opportunity, and the outcome you imagine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one.
    validations:
      required: false
