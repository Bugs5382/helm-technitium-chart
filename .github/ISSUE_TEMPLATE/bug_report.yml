name: 🐛 Bug Report
description: Report a problem with the Technitium Helm chart.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can investigate quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. helm install ...
        2. kubectl ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include logs and error output where possible.
    validations:
      required: true

  - type: input
    id: chart-version
    attributes:
      label: Chart Version
      description: Which version of the chart are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Technitium App Version
      placeholder: "14.3.0"
    validations:
      required: false

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes Version
      description: Output of `kubectl version --short`.
    validations:
      required: true

  - type: textarea
    id: values
    attributes:
      label: values.yaml (sanitized)
      description: Paste the relevant portions of your values.yaml. Remove any secrets.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help us track this down.
    validations:
      required: false
