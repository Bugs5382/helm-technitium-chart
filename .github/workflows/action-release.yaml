name: Release and Publish
on:
  workflow_dispatch:
  workflow_call:
  release:
    types:
      - released

permissions:
  contents: write
  actions: write
  checks: write
  id-token: write

jobs:

  Lint_Testing:
    uses: ./.github/workflows/action-test.yaml

  Release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Run Chart Releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"