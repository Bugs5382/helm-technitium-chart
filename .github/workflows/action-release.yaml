name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - 'technitium/**'

jobs:

  Lint_Testing:
    uses: ./.github/workflows/action-test.yaml

  Strip_Version:
    runs-on: ubuntu-latest
    needs: [ 'Lint_Testing' ]
    outputs:
      CLEAN_TAG: ${{ steps.set-output.outputs.CLEAN_TAG }}
    steps:
      - name: Strip "v" from Tag
        id: set-output
        run: echo "CLEAN_TAG=${GITHUB_EVENT_RELEASE_TAG_NAME#v}" >> $GITHUB_OUTPUT
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

  Update_Repo:
    runs-on: ubuntu-latest
    needs: [ 'Strip_Version' ]
    env:
      CLEAN_TAG: ${{ needs.Strip_Version.outputs.CLEAN_TAG }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          ref: ${{ env.GIT_BRANCH_TARGET }}
          sparse-checkout: |
            CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Update Chart Version
        run: |
          find charts -maxdepth 2 -name "Chart.yaml" -exec sed -i "s/^version:[[:space:]]*.*/version: $CLEAN_TAG/" {} +

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ github.event.release.name }}
          release-notes: ${{ github.event.release.body }}

      - name: Commit and Push Version Update
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore(release): ${{ github.event.release.tag_name }} [skip ci]"

  Release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [ 'Update_Repo' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Run Chart Releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"