name: Test

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  Lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Create kind cluster
        if: github.event.pull_request.draft == false
        uses: helm/kind-action@v1.10.0

      - name: Lint Charts
        run: helm lint technitium

      - name: Dry Run Install
        if: github.event.pull_request.draft == false
        run: helm install technitium-test-release technitium/ --dry-run --debug