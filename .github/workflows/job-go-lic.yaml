name: GoLic
on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
jobs:
  GoLic:
    name: GoLic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GoLic
        run: |
          export PATH=${PATH}:`go env GOPATH`/bin
          go install github.com/AbsaOSS/golic@v0.7.2
          golic inject --dry -x -t mit
