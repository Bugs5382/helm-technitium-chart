name: Version Manager

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  Lint_Testing:
    uses: ./.github/workflows/action-test.yaml

  Update_Draft_Release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    name: Pre-Release
    needs: Lint_Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📂 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Drafter (Anticipate Version)
        id: drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm Chart Version
        run: |
          task update-helm-version NEW_VERSION=${{ steps.drafter.outputs.resolved_version }}

      - name: 📤 Changelog Action
        uses: Bugs5382/changelog-updater-action@v0.3.2
        env:
          LOG_LEVEL: debug
          LOG_FORMAT: text
          RELEASE_NOTES: >-
            ${{ steps.drafter.outputs.body }}
          RELEASE_VERSION: v${{ steps.drafter.outputs.resolved_version }}
        with:
          tag: ${{ env.RELEASE_VERSION }}
          notes: ${{ env.RELEASE_NOTES }}
          diff: 'true'

      - name: Commit and Push Version Update
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore(pre-release): v${{ steps.drafter.outputs.resolved_version }} [skip ci]"

  Release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: Lint_Testing
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Package Chart
        run: helm package technitium/ -d .cr-release-packages/

      - name: Upload Chart to Release
        run: gh release upload "${{ github.event.release.tag_name }}" .cr-release-packages/*.tgz
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Install chart-releaser
        run: |
          cr_version="1.6.1"
          arch=$(uname -m)
          curl -sSL "https://github.com/helm/chart-releaser/releases/download/v${cr_version}/chart-releaser_${cr_version}_linux_${arch}.tar.gz" \
            | tar xzf - cr
          mv cr /usr/local/bin/cr

      - name: Update Helm Repo Index
        run: |
          owner=$(cut -d '/' -f 1 <<< "$GITHUB_REPOSITORY")
          repo=$(cut -d '/' -f 2 <<< "$GITHUB_REPOSITORY")
          cr index \
            --owner "$owner" \
            --repo "$repo" \
            --index-path ./index.yaml \
            --package-path .cr-release-packages \
            --config ./.github/config/cr.yaml \
            --push
        env:
          CR_TOKEN: ${{ steps.app-token.outputs.token }}
