apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "technitium.fullname" . }}
  labels:
    {{ include "technitium.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{ include "technitium.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{ include "technitium.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: technitium-dns-server
          image: "{{ .Values.image.repository }}/dns-server:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 5380
              name: web-ui
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config-storage
              mountPath: /etc/dns/config
      volumes:
        - name: config-storage
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "technitium.fullname" .) }}