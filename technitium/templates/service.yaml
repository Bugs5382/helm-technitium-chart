---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "technitium.fullname" . }}-web
  labels:
    {{- include "technitium.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  {{- with .Values.service.web.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.web.type | default "ClusterIP" }}
  selector:
    {{- include "technitium.selectorLabels" . | nindent 4 }}
  ports:
    - name: web-ui-http
      port: {{ .Values.ports.webHttp | default 5380 }}
      targetPort: web-ui-http
      protocol: TCP
    {{- if eq (include "technitium.httpsEnabled" .) "true" }}
    - name: web-ui-https
      port: {{ .Values.ports.webHttps | default 53443 }}
      targetPort: web-ui-https
      protocol: TCP
    {{- end }}
    {{- if .Values.ports.dohHttpProxy.enabled }}
    - name: doh-proxy-http
      port: 80
      targetPort: doh-proxy-http
      protocol: TCP
    {{- end }}
    {{- if .Values.ports.dohProxy.enabled }}
    - name: doh-proxy
      port: 8053
      targetPort: doh-proxy
      protocol: TCP
    {{- end }}
    {{- if .Values.cluster.enabled }}
    # Cluster mode: peer nodes send DNS NOTIFY / AXFR / IXFR to the same IP
    # they use for the HTTPS admin API (the IP registered at join time —
    # this Service's ClusterIP). Port 53 needs to answer here too, otherwise
    # NOTIFY is dropped on the floor. Note: opening the port is necessary
    # but not sufficient — outbound AXFR from a pod is sourced from the pod
    # IP, not the ClusterIP, so the catalog zone's allow-list still rejects
    # it. See README "Known limitation" for the full story.
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "technitium.fullname" . }}-dns
  labels:
    {{- include "technitium.labels" . | nindent 4 }}
    app.kubernetes.io/component: dns
  {{- with .Values.service.dns.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.dns.type | default "LoadBalancer" }}
  {{- if .Values.service.dns.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.service.dns.externalTrafficPolicy }}
  {{- end }}
  selector:
    {{- include "technitium.selectorLabels" . | nindent 4 }}
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    {{- if .Values.ports.doq.enabled }}
    - name: doq-udp
      port: 853
      targetPort: doq-udp
      protocol: UDP
    {{- end }}
    {{- if .Values.ports.dot.enabled }}
    - name: dot-tcp
      port: 853
      targetPort: dot-tcp
      protocol: TCP
    {{- end }}
    {{- if .Values.ports.doh3.enabled }}
    - name: doh3-udp
      port: 443
      targetPort: doh3-udp
      protocol: UDP
    {{- end }}
    {{- if .Values.ports.doh.enabled }}
    - name: doh-tcp
      port: 443
      targetPort: doh-tcp
      protocol: TCP
    {{- end }}
    {{- if .Values.ports.dhcp.enabled }}
    - name: dhcp
      port: 67
      targetPort: dhcp
      protocol: UDP
    {{- end }}
