# Default values for Technitium.

# Technitium Specific Configurations
config:
  # The primary server  name used by this DNS Server to identify itself.
  dnsDomain: "dns-server"

  # Plain text password for the DNS web console admin user.
  # Note: In the deployment spec, this is usually pulled from a Secret for better security.
  adminPassword: ""

  # Comma-separated list of IP addresses the web service should listen on.
  # Usually only needed when using "host" network mode; defaults to "[::]" (all interfaces).
  webServiceLocalAddresses: ""

  # Enables HTTPS for the web-based management console.
  # If true, ensure ports.webHttps is set to the desired port it will listen on..
  webServiceEnableHttps: ""

  # If true, the server generates a self-signed TLS certificate for the web console.
  webServiceUseSelfSignedCert: ""

  # The full file path inside the container to a .pfx TLS certificate file.
  webServiceTlsCertificatePath: "/etc/dns/tls/cert.pfx"

  # The password required to open the .pfx TLS certificate file.
  webServiceTlsCertificatePassword: ""

  # If true, any requests coming in on the HTTP port are automatically redirected to HTTPS.
  webServiceHttpToTlsRedirect: ""

  # Enables the DNS-over-HTTP protocol (usually on port 8053).
  # Use this when placing the server behind a TLS-terminating reverse proxy.
  optionalProtocolDnsOverHttp: ""

  # If true, prefer IPv6 addresses when resolving names.
  preferIpv6: ""

  # Controls recursion behavior. Options: "Allow", "Deny", "AllowOnlyForPrivateNetworks", "UseSpecifiedNetworks".
  recursion: ""

  # Comma-separated list of network ACL rules controlling which clients can use recursion.
  # Example: "allow 192.168.1.0/24, deny 0.0.0.0/0"
  recursionAcl: ""

  # Comma-separated list of IP ranges to explicitly DENY from using recursion.
  # Pro-tip: This is technically obsolete; recursionAcl (ACL) is the preferred modern method.
  recursionDeniedNetworks: ""

  # Comma-separated list of IP ranges to explicitly ALLOW for recursion.
  # Pro-tip: This is also technically obsolete in favor of recursionAcl.
  recursionAllowedNetworks: ""

  # If true, enables the domain blocking feature.
  enableBlocking: ""

  # If true, the server responds with a TXT record explaining why a domain was blocked.
  allowTxtBlockingReport: ""

  # A comma-separated list of URLs for blocklists (e.g., Ad-blocking or Malware lists).
  blockListUrls: ""

  # Comma-separated upstream forwarder addresses. Example: "1.1.1.1, 8.8.8.8"
  forwarders: ""

  # Protocol for upstream forwarders. Options: "Udp", "Tcp", "Tls", "Https", "HttpsJson".
  forwarderProtocol: ""

  # If true, log entries are stamped with local server time instead of UTC.
  logLocalTime: ""

image:
  # The Docker Hub repository for the Technitium DNS image.
  repository: technitium/dns-server
  # Kubernetes image pull policy (IfNotPresent, Always, or Never).
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  # tag: ""

ports:
  # Port for the DNS web management console (HTTP).
  webHttp: 5380
  # Port for HTTPS web console access.
  webHttps: 53443
  doq:
    # DNS-over-QUIC (UDP/853). High performance, encrypted DNS.
    enabled: false
  dot:
    # DNS-over-TLS (TCP/853). Standard encrypted DNS.
    enabled: false
  doh3:
    # DNS-over-HTTPS (UDP/443). Uses HTTP/3 for encrypted queries.
    enabled: false
  doh:
    # DNS-over-HTTPS (TCP/443). Uses HTTP/1.1 or HTTP/2.
    enabled: false
  dohHttpProxy:
    # DNS-over-HTTP (TCP/80). Useful for Certbot or specific reverse proxies.
    enabled: false
  dohProxy:
    # DNS-over-HTTP (TCP/8053). Custom port for use behind a TLS-terminating proxy.
    enabled: false
  dhcp:
    # DHCP Service (UDP/67). Enable if using the server to assign network IPs.
    enabled: false

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

ingress:
  enabled: false
  # IngressClass name for the ingress resource (e.g. "nginx", "traefik").
  className: ""
  # Annotations to add to the ingress resource.
  annotations: {}
  hosts:
    - host: technitium.example.local
      paths:
        - path: /
          pathType: Prefix
          port: 5380
  tls: []
  #  - secretName: technitium-tls
  #    hosts:
  #      -  admin.technitium.local

# Services are split into two so that the web management UI can sit
# behind an Ingress / reverse proxy with TLS while the DNS protocol
# ports are exposed directly via a LoadBalancer (or NodePort, etc.).
service:
  # Service for the web management console and DoH HTTP proxy ports.
  # Defaults to ClusterIP so it can be fronted by `ingress` with TLS.
  web:
    type: ClusterIP
    annotations: {}
  # Service for the DNS protocol ports (53, DoT, DoQ, direct DoH, DHCP).
  # Defaults to LoadBalancer so DNS clients get a stable external IP.
  dns:
    type: LoadBalancer
    annotations: {}
    # Set to "Local" to preserve client source IPs (useful for ACLs).
    externalTrafficPolicy: ""

# Resource requests and limits for the Technitium container.
# Example:
# resources:
#   requests:
#     cpu: 100m
#     memory: 128Mi
#   limits:
#     cpu: 500m
#     memory: 512Mi
resources: {}

# Pod-level security context. Defaults satisfy the Kubernetes
# "restricted" Pod Security Standard. Override with `{}` if your
# Technitium image variant cannot run as a non-root user.
# The `ip_unprivileged_port_start` sysctl lets uid 1000 bind port 53
# directly — dotnet does not reliably honor an ambient NET_BIND_SERVICE
# capability when allowPrivilegeEscalation is false.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
  sysctls:
    - name: net.ipv4.ip_unprivileged_port_start
      value: "53"

# Container-level security context for the Technitium container.
# Defaults satisfy the "restricted" Pod Security Standard while still
# allowing the server to bind to privileged port 53 via NET_BIND_SERVICE.
# Override with `{}` if your image cannot run as non-root.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# Persistence configuration for the Technitium data volume.
# Example:
# persistence:
#   size: 2Gi
#   storageClass: ""
#   accessModes:
#     - ReadWriteOnce
#   existingClaim: ""
persistence: {}

# Technitium clustering. Lets two or more independent Helm releases (typically
# in the same namespace) participate in a single Technitium cluster managed
# from one admin web console. See README.md "Clustering" for the full workflow.
#
# Important: clustering is *initialized* and *joined* through the Technitium
# web admin UI — this chart does not call the cluster API. Enabling this block
# only (a) adds discovery labels, (b) auto-enables HTTPS with a self-signed
# cert (DANE-EE requires TLS, and cannot be terminated at a reverse proxy),
# and (c) prints join instructions in NOTES.txt.
cluster:
  # Toggle clustering mode for this release.
  enabled: false

  # Shared cluster zone name. Must be identical on every node in the cluster.
  # The first node to be initialized will host this zone; secondaries discover
  # peers through its A/AAAA/TLSA records. Example: "ns.example.local".
  domain: ""

  # When this release is the *secondary*, set this to the Helm release name of
  # the primary node living in the same namespace. NOTES.txt will then print
  # the primary's in-cluster web URL and ClusterIP lookup command so you can
  # paste them into the "Join Cluster" wizard. Leave empty on the primary.
  primaryReleaseName: ""

  # When true (default while cluster.enabled), the chart forces HTTPS on the
  # web service with a self-signed cert — required for DANE-EE node-to-node
  # TLS. Set to false only if you are terminating TLS some other way (rare).
  autoHttps: true

  # When true, add a second, headless Service (`<fullname>-headless`) alongside
  # the standard ClusterIP web Service. The headless service resolves to the
  # pod IP, which is useful if you want to bypass kube-proxy for peer traffic.
  # Note: with a single-replica Deployment, the pod IP changes on restart, so
  # the headless DNS record will churn — the chart's API automation uses the
  # stable ClusterIP, not the headless name. This is purely opt-in extra.
  headless: false

  # Automate cluster init/join via Technitium's HTTP admin API after install.
  # - Primary release (cluster.primaryReleaseName is empty): runs a post-install
  #   Job that calls /api/admin/cluster/init with the cluster domain and this
  #   release's web ClusterIP.
  # - Secondary release (cluster.primaryReleaseName is set): runs a post-install
  #   Job that calls /api/admin/cluster/initJoin against this node, pointing at
  #   the primary's URL/ClusterIP and using the primary's admin password (read
  #   from the primary's `<primaryReleaseName>-technitium-admin` Secret in the
  #   same namespace — that release must be installed first).
  # Both Jobs are idempotent: they check /api/admin/cluster/state first and
  # exit cleanly if the node is already clustered.
  autoJoin: true

  # Technitium admin username. The chart's secret holds the password under the
  # `password` key; this is the matching username (Technitium's default is "admin").
  adminUsername: "admin"

  # Optional 6-digit TOTP code for the admin user when joining a cluster.
  # Leave empty unless you've enabled 2FA on the primary's admin account.
  primaryNodeTotp: ""

  # Container image used by the post-install Job that calls the cluster API.
  # Must include `curl` and run as a non-root user. `curlimages/curl` ships
  # with curl preinstalled and runs as uid 100, which avoids any apk install
  # step and is compatible with the "restricted" Pod Security Standard.
  jobImage:
    repository: curlimages/curl
    tag: "8.10.1"
    pullPolicy: IfNotPresent
